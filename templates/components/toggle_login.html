{% if user.is_authenticated %}

<ul class="nav navbar-nav navbar-right">
  <li><a href="{% url 'profile' %}">Hello, {{ user.get_username }}</a></li>
  <li>
    <li><a href="{% url 'logout' %}" class="text-danger">Вийти</a></li>
  </li>
</ul>

{% else %}

<form class="navbar-form navbar-right" method="POST" action="{% url 'login' %}">
  {% csrf_token %}

    <div class="form-group">
      <input type="text" class="form-control" name="username" placeholder="Login">
    </div>

    <div class="form-group">
      <input type="password" class="form-control" name="password" placeholder="Password">
    </div>

  <button type='submit' class="btn btn-success">Вхід</button>

  <button  class="btn btn-danger"><a href="{% url 'register' %}">Registr</a></button>
</form>


<script>
  function

</script>


{% endif %}
