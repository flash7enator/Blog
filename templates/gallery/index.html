{% extends "layout/main_layout.html" %}
{% load thumbnail %}

{% block 'content' %}

<h1>Gallery</h1>
<p><a class="btn btn-primary" href="{% url 'gallery:gallery_upload' %}">Upload</a></p>

{% for image in images %}
    <h2>{{ image.title }}</h2>

    {% thumbnail image.image "200x200" crop="center" as m %}
        <a target="_blank" href="{{ image.image.url }}">
            <img src="{{ m.url }}">
        </a>


{% empty %}
    <p>No images yet.</p>
{% endfor %}

{% endblock %}
