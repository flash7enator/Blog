{% extends "base.html" %}

{% block  main %}
{% load thumbnail %}

<h1>Product detail</h1>

<h1>{{ product.title }}</h1>
<img src="{{ product.image.url }}">

<a class="btn btn-primary" href="{% url 'shop:cart_add' product_id=product.id %}">Add to cart</a>


{% endblock %}
